# fly.toml app configuration file generated for project-ava-watcher on 2026-03-20T12:06:04-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'project-ava-watcher'
primary_region = 'iad'

[build]

[processes]
  watcher = "python3 -m src.watcher --backend anthropic_api"

[env]
  SUPABASE_LIVE = '1'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
  auto_stop = false
